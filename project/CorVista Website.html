<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CorVista Health — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CorVista Health — site design system
   ============================================================ */

:root {
  /* Colors — CorVista Health brand tokens (baked from colors_and_type.css) */
  --ink: #212935;        /* brand ink — headlines, wordmark, dark surfaces */
  --ink-deep: #0E1F33;   /* deeper navy — footer / cta full-bleed */
  --ink-deepest: #081627;
  --navy: #212935;
  --navy-2: #2D3744;
  --blue: #5DB4E8;       /* sky — the brand blue */
  --blue-bright: #7CC3EF;
  --blue-deep: #2E7DC1;  /* deeper sky for emphasis/links on light */
  --blue-tint: #BFE0F4;  /* sky-soft */
  --blue-tint-2: #E6F2FB;/* sky-wash */
  --paper: #F2F4F7;      /* slate — product/page background */
  --paper-2: #E5E9EE;    /* slate-100 */
  --parchment: #F4EFE6;  /* editorial cream — leadership / pull-quote only */
  --parchment-2: #ECE4D2;
  --line: #DCE1E8;       /* brand border on light */
  --mid: #4A5462;        /* slate-500 — secondary text */
  --mid-2: #6B7686;      /* slate-400 — meta */
  --white: #FFFFFF;

  /* Effective theme tokens (overridden by [data-theme]) */
  --bg: var(--paper);
  --bg-elev: var(--white);
  --fg: var(--ink);
  --fg-muted: var(--mid);
  --rule: var(--line);
  --card: var(--white);
  --card-fg: var(--ink);

  /* Type scale */
  --t-eyebrow: 11px;
  --t-meta: 13px;
  --t-body: 16px;
  --t-lead: 19px;
  --t-h6: 14px;
  --t-h5: 18px;
  --t-h4: 24px;
  --t-h3: 34px;
  --t-h2: 56px;
  --t-h1: 96px;
  --t-display: 140px;

  /* Spacing */
  --gutter: clamp(20px, 4vw, 56px);
  --section-y: clamp(72px, 8vw, 140px);
  --radius-sm: 4px;
  --radius: 6px;
  --radius-md: 6px;
  --radius-lg: 10px;

  /* Fonts — Sora (display) + Manrope (body) + Geist Mono (mono) */
  --f-sans: "Sora", "Söhne", "Manrope", -apple-system, system-ui, sans-serif;
  --f-body: "Manrope", "Söhne", -apple-system, system-ui, sans-serif;
  --f-serif: var(--f-sans);  /* emphasis uses display-italic, not a serif */
  --f-mono: "Geist Mono", "IBM Plex Mono", ui-monospace, monospace;
}

[data-theme="dark"] {
  --bg: var(--ink);
  --bg-elev: #131C2C;
  --fg: #F4F6F9;
  --fg-muted: #98A2B3;
  --rule: #1F2A3D;
  --card: #131C2C;
  --card-fg: #F4F6F9;
}

[data-density="compact"] {
  --section-y: clamp(56px, 6vw, 96px);
  --t-h1: 76px;
  --t-h2: 44px;
  --t-h3: 28px;
  --t-display: 110px;
}

/* ============================================================ */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: var(--f-body);
  font-size: var(--t-body);
  line-height: 1.5;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background 240ms ease, color 240ms ease;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

/* Type helpers */
.eyebrow {
  font-family: var(--f-mono);
  font-size: var(--t-eyebrow);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--fg-muted);
  font-weight: 500;
}
.eyebrow .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  margin-right: 10px;
  vertical-align: 2px;
}
.meta {
  font-family: var(--f-mono);
  font-size: var(--t-meta);
  color: var(--fg-muted);
  letter-spacing: 0.02em;
}
.lead {
  font-size: var(--t-lead);
  line-height: 1.5;
  color: var(--fg);
  max-width: 60ch;
  text-wrap: pretty;
}
.serif { font-family: var(--f-serif); font-weight: 400; }
.serif-i { font-family: var(--f-serif); font-style: italic; font-weight: 400; }

h1, h2, h3, h4, h5 {
  font-family: var(--f-sans);
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.02em;
  line-height: 1.04;
  text-wrap: balance;
}
h1 { font-size: var(--t-h1); letter-spacing: -0.035em; }
h2 { font-size: var(--t-h2); letter-spacing: -0.03em; }
h3 { font-size: var(--t-h3); letter-spacing: -0.02em; }
h4 { font-size: var(--t-h4); }
h5 { font-size: var(--t-h5); }

.display {
  font-size: var(--t-display);
  font-family: var(--f-sans);
  font-weight: 400;
  letter-spacing: -0.045em;
  line-height: 0.92;
}

p { margin: 0; }

/* Layout */
.container {
  max-width: 1480px;
  margin: 0 auto;
  padding-inline: var(--gutter);
}
.container-wide { max-width: 1640px; margin: 0 auto; padding-inline: var(--gutter); }
.section { padding-block: var(--section-y); }
.rule {
  height: 1px;
  background: var(--rule);
  border: 0;
  margin: 0;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border: 1px solid var(--fg);
  background: var(--fg);
  color: var(--bg);
  font-weight: 500;
  font-size: 15px;
  border-radius: var(--radius-md);
  transition: transform 160ms ease, background 160ms ease, color 160ms ease;
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}
.btn-primary:hover { background: var(--ink-deep); border-color: var(--ink-deep); color: #fff; }
.btn-ghost {
  background: transparent;
  color: var(--fg);
}
.btn-ghost:hover { background: var(--fg); color: var(--bg); }
.btn-link {
  background: transparent;
  border: 0;
  padding: 6px 0;
  color: var(--fg);
  border-radius: 0;
  border-bottom: 1px solid currentColor;
  gap: 8px;
}
.btn-link:hover { color: var(--blue-deep); }
.arrow { display: inline-block; transition: transform 200ms ease; }
.btn:hover .arrow, a:hover .arrow { transform: translateX(3px); }

/* Header / nav */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--bg) 86%, transparent);
  backdrop-filter: saturate(150%) blur(14px);
  -webkit-backdrop-filter: saturate(150%) blur(14px);
  border-bottom: 1px solid var(--rule);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  padding-inline: var(--gutter);
  max-width: 1640px;
  margin: 0 auto;
  gap: 24px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
  flex: 0 0 auto;
}
.brand img { flex: 0 0 auto; max-width: none; }
.brand-mark {
  width: 26px; height: 26px;
}
.brand-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0;
}
.brand-name .blue { color: var(--blue); }
.nav {
  display: flex;
  gap: 4px;
  align-items: center;
}
.nav a {
  padding: 10px 14px;
  font-size: 14px;
  border-radius: 999px;
  color: var(--fg);
  position: relative;
}
.nav a:hover { color: var(--blue-deep); }
.nav a.active {
  color: var(--blue-deep);
}
[data-theme="dark"] .nav a.active { color: var(--blue); }
.nav a.active::after {
  content: '';
  position: absolute;
  left: 14px;
  right: 14px;
  bottom: 4px;
  height: 1px;
  background: currentColor;
}
.nav-cta {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* Hero */
.hero {
  padding-top: clamp(40px, 6vw, 80px);
  padding-bottom: clamp(60px, 8vw, 120px);
  position: relative;
}
.hero-eyebrow {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 36px;
  flex-wrap: wrap;
}
.hero-title {
  font-size: clamp(48px, 8vw, 128px);
  letter-spacing: -0.035em;
  line-height: 0.96;
  margin: 0;
  font-weight: 600;
}
.hero-title .em {
  font-family: var(--f-serif);
  font-style: italic;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--blue-deep);
}
[data-theme="dark"] .hero-title .em { color: var(--blue); }

/* Cards */
.card {
  background: var(--card);
  color: var(--card-fg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 28px;
}

/* Pill / chip */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--fg-muted);
}
.chip-blue {
  border-color: var(--blue);
  color: var(--blue-deep);
  background: var(--blue-tint-2);
}
[data-theme="dark"] .chip-blue {
  color: var(--blue);
  background: rgba(91, 175, 232, 0.12);
}

/* Stat */
.stat-num {
  font-family: var(--f-sans);
  font-size: clamp(64px, 8vw, 132px);
  font-weight: 500;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--blue-deep);
}
.stat-num .unit {
  font-size: 0.45em;
  vertical-align: 0.5em;
  font-weight: 400;
  color: var(--fg-muted);
  margin-left: 4px;
  letter-spacing: -0.02em;
}
.stat-label {
  font-family: var(--f-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--fg-muted);
  margin-bottom: 10px;
}
.stat-desc { color: var(--fg-muted); font-size: 14px; max-width: 28ch; }

/* Image placeholder */
.imgph {
  background: var(--paper-2);
  background-image:
    repeating-linear-gradient(135deg, transparent 0, transparent 13px,
      color-mix(in oklab, var(--mid) 18%, transparent) 13px,
      color-mix(in oklab, var(--mid) 18%, transparent) 14px);
  border: 1px solid var(--rule);
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
}
[data-theme="dark"] .imgph {
  background-color: #1A2233;
  background-image:
    repeating-linear-gradient(135deg, transparent 0, transparent 13px,
      rgba(91, 175, 232, 0.12) 13px,
      rgba(91, 175, 232, 0.12) 14px);
  border-color: #25324A;
}
.imgph-label {
  font-family: var(--f-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--fg-muted);
  background: var(--bg);
  padding: 6px 10px;
  margin: 12px;
  border: 1px solid var(--rule);
}
.imgph-dark { color-scheme: dark; }
.imgph-dark.imgph {
  background-color: var(--ink);
  background-image:
    repeating-linear-gradient(135deg, transparent 0, transparent 13px,
      rgba(91, 175, 232, 0.18) 13px,
      rgba(91, 175, 232, 0.18) 14px);
  border-color: #1B2638;
}
.imgph-dark .imgph-label { background: var(--ink); color: #98A2B3; border-color: #25324A; }

/* Grid helpers */
.row { display: grid; gap: 32px; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-3 { grid-template-columns: repeat(3, 1fr); }
.row-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 920px) {
  .row-2, .row-3, .row-4 { grid-template-columns: 1fr; }
}

/* Footer */
.footer {
  background: var(--ink-deep);
  color: #C2C9D4;
  padding: 80px 0 32px;
  margin-top: 0;
}
.footer .btn-primary, .hero-darkbg .btn-primary, .hero-split-right .btn-primary,
.section-dark .btn-primary {
  background: var(--blue); border-color: var(--blue); color: var(--ink);
}
.footer .btn-primary:hover, .hero-darkbg .btn-primary:hover,
.hero-split-right .btn-primary:hover, .section-dark .btn-primary:hover {
  background: var(--blue-bright); border-color: var(--blue-bright); color: var(--ink);
}
.footer .footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 64px;
}
@media (max-width: 900px) { .footer .footer-grid { grid-template-columns: 1fr 1fr; } }
.footer h6 {
  font-family: var(--f-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #6B7280;
  margin: 0 0 18px;
  font-weight: 500;
}
.footer a { color: #C2C9D4; display: block; padding: 4px 0; font-size: 14px; }
.footer a:hover { color: var(--blue); }
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
  border-top: 1px solid #1A2334;
  font-family: var(--f-mono);
  font-size: 12px;
  color: #6B7280;
}

/* ECG line decoration */
.ecg-line { height: 60px; width: 100%; }
.ecg-line path {
  fill: none;
  stroke: var(--blue);
  stroke-width: 1.5;
}

/* Page transitions */
.page-fade {
  animation: pageFade 360ms cubic-bezier(.2,.7,.3,1);
}
@keyframes pageFade {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Marquee bar (used to telegraph credibility) */
.marquee {
  display: flex;
  gap: 56px;
  align-items: center;
  padding: 28px 0;
  border-block: 1px solid var(--rule);
  overflow: hidden;
}
.marquee-track {
  display: flex;
  gap: 56px;
  align-items: center;
  white-space: nowrap;
  font-family: var(--f-mono);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--fg-muted);
  animation: scroll 38s linear infinite;
}
@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.marquee-track span.dot { color: var(--blue); }

/* Section header */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 40px;
  margin-bottom: 56px;
  flex-wrap: wrap;
}
.section-header h2 { max-width: 18ch; }

/* Dark section */
.section-dark {
  background: var(--ink);
  color: #F4F6F9;
}
.section-dark .eyebrow { color: #98A2B3; }
.section-dark .lead { color: #C8D0DC; }
.section-dark .meta { color: #98A2B3; }
.section-dark .stat-num { color: #F4F6F9; }
.section-dark .stat-desc { color: #98A2B3; }
.section-dark .rule { background: #1F2A3D; }
.section-dark .card { background: #131C2C; border-color: #1F2A3D; color: #F4F6F9; }
.section-dark .chip { color: #98A2B3; border-color: #1F2A3D; }
.section-dark .btn { background: var(--blue); border-color: var(--blue); color: var(--ink); }
.section-dark .btn-ghost { background: transparent; color: #F4F6F9; border-color: #F4F6F9; }
.section-dark .imgph { background-color: #1A2233; background-image: repeating-linear-gradient(135deg, transparent 0, transparent 13px, rgba(91, 175, 232, 0.16) 13px, rgba(91, 175, 232, 0.16) 14px); border-color: #25324A; }
.section-dark .imgph-label { background: var(--ink); color: #98A2B3; border-color: #25324A; }

/* Hover image lift */
.hover-lift { transition: transform 320ms cubic-bezier(.2,.7,.3,1); }
.hover-lift:hover { transform: translateY(-4px); }

/* Inline link */
.ilink {
  color: var(--blue-deep);
  border-bottom: 1px solid currentColor;
  padding-bottom: 1px;
  transition: color 160ms ease;
}
[data-theme="dark"] .ilink { color: var(--blue); }
.ilink:hover { color: var(--ink); }

/* List */
.bullets {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 14px;
}
.bullets li {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 12px;
  align-items: start;
  font-size: 15px;
  color: var(--fg);
}
.bullets li::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--blue);
  margin-top: 8px;
  display: block;
  border-radius: 1px;
  transform: rotate(45deg);
}

/* Hero variants */
.hero-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 56px;
  align-items: end;
}
@media (max-width: 1000px) { .hero-grid { grid-template-columns: 1fr; } }

.hero-darkbg {
  background: var(--ink);
  color: #F4F6F9;
}
.hero-darkbg .hero-title { color: #F4F6F9; }
.hero-darkbg .hero-title .em { color: var(--blue); }
.hero-darkbg .eyebrow { color: #98A2B3; }
.hero-darkbg .lead { color: #C8D0DC; }
.hero-darkbg .btn-ghost { color: #F4F6F9; border-color: #F4F6F9; }

/* Hero variant: split */
.hero-split {
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  min-height: 78vh;
  align-items: stretch;
  gap: 0;
  border-block: 1px solid var(--rule);
}
.hero-split-left {
  padding: clamp(40px, 6vw, 96px) var(--gutter);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: 1px solid var(--rule);
}
.hero-split-right {
  background: var(--ink);
  color: #F4F6F9;
  padding: clamp(40px, 6vw, 96px) var(--gutter);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
@media (max-width: 980px) {
  .hero-split { grid-template-columns: 1fr; min-height: auto; }
  .hero-split-left { border-right: 0; border-bottom: 1px solid var(--rule); }
}

/* Anatomy ring (decorative) */
.ring {
  position: absolute;
  border: 1px solid rgba(91,175,232,0.35);
  border-radius: 50%;
  pointer-events: none;
}

/* Sub-page hero */
.subhero {
  padding-block: clamp(60px, 8vw, 120px);
  border-bottom: 1px solid var(--rule);
}
.subhero h1 {
  font-size: clamp(48px, 7vw, 104px);
  max-width: 14ch;
  font-weight: 400;
}
.subhero h1 .em { font-family: var(--f-serif); font-style: italic; color: var(--blue-deep); }
[data-theme="dark"] .subhero h1 .em { color: var(--blue); }
.subhero .lead { margin-top: 28px; max-width: 56ch; }

/* Tweaks panel styling overrides (light) */
[data-tweaks-panel-root] {
  font-family: var(--f-sans);
}

/* Tag */
.tag {
  display: inline-block;
  font-family: var(--f-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--fg-muted);
  padding: 4px 10px;
  border: 1px solid var(--rule);
  border-radius: 999px;
}

/* Press logos placeholder */
.press-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1px;
  background: var(--rule);
  border-block: 1px solid var(--rule);
}
@media (max-width: 800px) { .press-grid { grid-template-columns: repeat(2, 1fr); } }
.press-cell {
  background: var(--bg);
  padding: 32px 18px;
  text-align: center;
  font-family: var(--f-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--fg-muted);
}

/* Quote */
.quote {
  font-family: var(--f-serif);
  font-style: italic;
  font-size: clamp(28px, 3.4vw, 48px);
  line-height: 1.18;
  letter-spacing: -0.015em;
  font-weight: 400;
  max-width: 22ch;
  text-wrap: balance;
}
.quote::before { content: '“'; font-family: var(--f-serif); margin-right: 0.05em; }
.quote::after { content: '”'; font-family: var(--f-serif); margin-left: 0.05em; }

/* Tab system */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.tab {
  background: transparent;
  border: 0;
  padding: 14px 20px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  transition: color 160ms ease, border-color 160ms ease;
}
.tab[aria-selected="true"] {
  color: var(--fg);
  border-bottom-color: var(--blue);
}
.tab:hover { color: var(--fg); }

/* Team grid */
.team-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px 24px;
}
@media (max-width: 1000px) { .team-grid { grid-template-columns: repeat(2, 1fr); } }
.team-card .face {
  aspect-ratio: 4/5;
  margin-bottom: 14px;
}
.team-card .name {
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.team-card .role {
  font-family: var(--f-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--fg-muted);
  margin-top: 4px;
}

/* News card */
.news-card {
  display: grid;
  grid-template-columns: 200px 1fr auto;
  gap: 32px;
  padding: 28px 0;
  border-top: 1px solid var(--rule);
  align-items: center;
}
@media (max-width: 800px) { .news-card { grid-template-columns: 1fr; } }
.news-card .news-date { font-family: var(--f-mono); font-size: 12px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.14em; }
.news-card .news-title { font-size: 22px; line-height: 1.22; letter-spacing: -0.015em; font-weight: 500; text-wrap: balance; }
.news-card .news-cat { font-family: var(--f-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--blue-deep); }
[data-theme="dark"] .news-card .news-cat { color: var(--blue); }

/* Form */
.field {
  display: grid;
  gap: 6px;
}
.field label {
  font-family: var(--f-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--fg-muted);
}
.field input, .field select, .field textarea {
  font: inherit;
  padding: 14px 16px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--card);
  color: var(--card-fg);
  outline: none;
  transition: border-color 160ms ease;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--blue);
}

/* Card hover */
.tile {
  display: block;
  border: 1px solid var(--rule);
  background: var(--card);
  color: var(--card-fg);
  padding: 32px;
  transition: background 220ms ease, transform 220ms ease, border-color 220ms ease;
  position: relative;
}
.tile:hover {
  background: var(--ink);
  color: #F4F6F9;
  border-color: var(--ink);
}
.tile:hover .tile-arrow { transform: translate(4px, -4px); }
.tile-arrow {
  position: absolute;
  top: 28px; right: 28px;
  font-family: var(--f-mono);
  transition: transform 220ms ease;
  font-size: 18px;
}
.tile h4 { font-weight: 500; letter-spacing: -0.015em; margin-bottom: 12px; }
.tile p { color: inherit; opacity: 0.78; font-size: 14px; line-height: 1.5; max-width: 32ch; }


/* Technology disease sub-pages + workflow compare */
.disease-card {
  display: block;
  padding: 28px;
  border-left: 1px solid var(--rule);
  text-decoration: none;
  color: inherit;
  transition: background 160ms ease;
}
.disease-card.first { border-left: 0; }
.disease-card:hover { background: var(--blue-tint-2); }
.disease-card .explore {
  margin-top: 18px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--blue-deep);
}
[data-theme="dark"] .disease-card:hover { background: rgba(91, 175, 232, 0.10); }
[data-theme="dark"] .disease-card .explore { color: var(--blue); }
@media (max-width: 920px) {
  .disease-card { border-left: 0; border-top: 1px solid var(--rule); }
  .disease-card.first { border-top: 0; }
}

.subnav { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 36px; align-items: center; }
.subnav a {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 16px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  color: var(--fg-muted);
  text-decoration: none;
  transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
}
.subnav a:hover { border-color: var(--fg); color: var(--fg); }
.subnav a.active { background: var(--ink); border-color: var(--ink); color: #fff; }
[data-theme="dark"] .subnav a.active { background: var(--blue); border-color: var(--blue); color: var(--ink); }
.subnav a.back { border: 0; padding-left: 0; padding-right: 18px; color: var(--mid-2); }
.subnav a.back:hover { color: var(--blue-deep); }

.crumb {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mid-2);
  display: flex;
  gap: 10px;
  align-items: center;
}
.crumb a { color: var(--mid-2); text-decoration: none; }
.crumb a:hover { color: var(--blue-deep); }

.compare-col {
  padding: 36px;
  border: 1px solid var(--rule);
  border-radius: 6px;
}
.compare-col.after { background: var(--ink); border-color: var(--ink); }
.compare-row {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 12px;
  padding: 16px 0;
  border-top: 1px solid var(--rule);
  font-size: 15px;
  line-height: 1.5;
}
.compare-col.after .compare-row { border-color: #1F2A3D; }


/* Nav dropdown */
.nav-item { position: relative; display: flex; }
.nav a.has-caret { display: inline-flex; align-items: center; gap: 6px; }
.caret {
  width: 7px; height: 7px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: translateY(-2px) rotate(45deg);
  transition: transform 160ms ease;
  opacity: 0.65;
}
.nav-item:hover .caret,
.nav-item:focus-within .caret { transform: translateY(0) rotate(225deg); }
.nav-item .dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 264px;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  box-shadow: 0 12px 32px rgba(16, 31, 51, 0.14);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-6px);
  transition: opacity 160ms var(--ease, ease), transform 160ms var(--ease, ease), visibility 160ms;
  z-index: 60;
}
.nav-item:hover .dropdown,
.nav-item:focus-within .dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
.dropdown a {
  display: block;
  padding: 11px 12px;
  border-radius: 4px;
  font-size: 14px;
  color: var(--fg);
}
.dropdown a:hover { background: var(--rule); }
.dropdown a.active { color: var(--blue-deep); }
[data-theme="dark"] .dropdown a.active { color: var(--blue); }
.dropdown a.active::after { content: none; }
.dropdown .d-abbr {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--mid-2);
  margin-right: 10px;
}
.dropdown a:hover .d-abbr,
.dropdown a.active .d-abbr { color: var(--blue-deep); }
[data-theme="dark"] .dropdown a:hover .d-abbr,
[data-theme="dark"] .dropdown a.active .d-abbr { color: var(--blue); }
.dropdown .d-sub {
  display: block;
  font-size: 12px;
  color: var(--fg-muted);
  margin-top: 3px;
}
.dropdown .d-sep { height: 1px; background: var(--rule); margin: 6px 4px; }

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.

// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so

// Usage (in an HTML file that loads React + Babel):

//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

//     "density": "regular",
//     "dark": false

//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}

//           <TweakSection label="Theme" />

//           <TweakColor  label="Palette" value={t.palette}
//                        options={[['#D97757', '#29261b', '#f6f4ef'],

//                        onChange={(v) => setTweak('palette', v)} />

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;

  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

}

function TweakRow({ label, value, children, inline = false }) {

    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ECG sparkline (decorative)
function EcgLine({ color = "var(--blue)", height = 60, segments = 6, strokeWidth = 1.5 }) {
  // Build a procedurally generated ECG-like polyline
  const width = 1000;
  const baseline = height / 2;
  const segW = width / segments;
  let d = `M 0 ${baseline}`;
  for (let i = 0; i < segments; i++) {
    const x0 = i * segW;
    // PQRST shape relative to segment
    d += ` L ${x0 + segW*0.18} ${baseline}`;          // baseline
    d += ` L ${x0 + segW*0.22} ${baseline - height*0.08}`; // P
    d += ` L ${x0 + segW*0.26} ${baseline}`;
    d += ` L ${x0 + segW*0.30} ${baseline + height*0.05}`;  // Q
    d += ` L ${x0 + segW*0.34} ${baseline - height*0.45}`;  // R
    d += ` L ${x0 + segW*0.38} ${baseline + height*0.20}`;  // S
    d += ` L ${x0 + segW*0.50} ${baseline}`;
    d += ` L ${x0 + segW*0.60} ${baseline - height*0.12}`;  // T
    d += ` L ${x0 + segW*0.68} ${baseline}`;
    d += ` L ${x0 + segW} ${baseline}`;
  }
  return (
    <svg className="ecg-line" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{height}}>
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="square" strokeLinejoin="miter" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

/* ============ src/app.jsx ============ */
/* global React, ReactDOM, Header, Footer, HomePage, TechnologyPage, CliniciansPage,
   PatientsPage, EvidencePage, AboutPage, NewsPage, InvestorsPage, ContactPage,
   TechCadPage, TechPhPage, TechPcwpPage, SiteTweaks, useTweaks */

const { useState, useEffect } = React;

const TWEAK_DEFAULTS = window.__TWEAK_DEFAULTS__;

function App() {
  const [page, setPage] = useState(() => {
    const h = (window.location.hash || '').replace('#', '');
    const valid = ['home', 'technology', 'tech-cad', 'tech-ph', 'tech-pcwp', 'clinicians', 'patients', 'evidence', 'about', 'news', 'investors', 'contact'];
    return valid.includes(h) ? h : 'home';
  });
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Navigation
  useEffect(() => {
    const handler = (e) => {
      const slug = e.detail;
      if (slug && slug !== page) {
        setPage(slug);
        window.location.hash = slug;
        window.scrollTo({ top: 0, behavior: 'instant' });
      }
    };
    window.addEventListener('cv-navigate', handler);
    const hashHandler = () => {
      const h = (window.location.hash || '').replace('#', '');
      if (h) setPage(h);
    };
    window.addEventListener('hashchange', hashHandler);
    return () => {
      window.removeEventListener('cv-navigate', handler);
      window.removeEventListener('hashchange', hashHandler);
    };
  }, [page]);

  // Apply theme + density to root
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    document.documentElement.setAttribute('data-density', tweaks.density);
    document.documentElement.style.setProperty('--blue', tweaks.accentHue);
    // Derive deep variant via filter-equivalent — just darken with hue preservation
    document.documentElement.style.setProperty('--blue-deep',
      tweaks.theme === 'dark' ? tweaks.accentHue : darken(tweaks.accentHue, 0.22));
    document.documentElement.style.setProperty('--blue-tint', tint(tweaks.accentHue, 0.85));
    document.documentElement.style.setProperty('--blue-tint-2', tint(tweaks.accentHue, 0.93));
  }, [tweaks.theme, tweaks.density, tweaks.accentHue]);

  let Page = HomePage;
  if (page === 'technology') Page = TechnologyPage;
  else if (page === 'tech-cad') Page = TechCadPage;
  else if (page === 'tech-ph') Page = TechPhPage;
  else if (page === 'tech-pcwp') Page = TechPcwpPage;
  else if (page === 'clinicians') Page = CliniciansPage;
  else if (page === 'patients') Page = PatientsPage;
  else if (page === 'evidence') Page = EvidencePage;
  else if (page === 'about') Page = AboutPage;
  else if (page === 'news') Page = NewsPage;
  else if (page === 'investors') Page = InvestorsPage;
  else if (page === 'contact') Page = ContactPage;

  return (
    <>
      <Header page={page} />
      <main key={page}>
        <Page tweaks={tweaks} />
      </main>
      <Footer />
      <SiteTweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

// Tiny color utilities
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function rgbToHex([r,g,b]) {
  return '#' + [r,g,b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function darken(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex([r*(1-amt), g*(1-amt), b*(1-amt)]);
}
function tint(hex, amt) {
  // mix with white
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex([r + (255-r)*amt, g + (255-g)*amt, b + (255-b)*amt]);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
